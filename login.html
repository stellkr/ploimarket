<!DOCTYPE html>
<!-- HTML5 문서임을 선언합니다. -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PloiMarket - 로그인</title>
    <!-- css 스타일시트를 적용합니다. -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <!-- 맛길 스타일 통합 헤더 -->
    <header class="site-header">
        <div class="header-left">
            <h1><a href="index.html">PloiMarket</a></h1>
            <nav class="site-nav">
                <a href="about.html">About</a>
                <a href="best.html">베스트 상품</a>
                <a href="it-devices.html">IT 기기</a>
                <a href="web-templates.html">웹 템플릿</a>
                <a href="cs.html">고객센터</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-bar">
                <input class="search-input" type="text" id="searchInput" placeholder="찾으시는 상품이 있나요?">
                <button class="search-button" type="button" onclick="searchBtn()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <button class="btn-darkmode" type="button" onclick="toggleDarkMode()">🌙</button>
            <a href="login.html" class="btn-login">로그인</a>
            <a href="signup.html" class="btn-signup">회원가입</a>
        </div>
    </header>

    <!-- 화면 중앙에 폼을 배치하기 위한 전체 컨테이너입니다. -->
    <div class="auth-container">
        <!-- 실제 로그인 폼을 감싸는 하얀색 둥근 카드입니다. -->
        <div class="auth-card">
            <h2>로그인</h2>
            <hr>
            
            <!-- 로그인 폼입니다. 제출(Submit) 버튼을 누르면 자바스크립트의 loginValidation() 함수가 실행되며, 반환값이 false이면 폼 제출이 중단됩니다. -->
            <form onsubmit="return loginValidation()">
                
                <!-- 아이디 입력 폼 그룹입니다. -->
                <div class="form-group">
                    <label for="loginId">아이디</label>
                    <input type="text" id="loginId" placeholder="아이디를 입력해주세요">
                    <!-- 유효성 검사 실패 시 자바스크립트에서 보여줄 에러 메시지 상자입니다. 평소엔 CSS로 숨겨져 있습니다. -->
                    <div id="loginIdError" class="error-message">아이디를 입력해주세요.</div>
                </div>

                <!-- 비밀번호 입력 폼 그룹입니다. type="password"를 써서 문자가 별표로 보입니다. -->
                <div class="form-group">
                    <label for="loginPw">비밀번호</label>
                    <input type="password" id="loginPw" placeholder="비밀번호를 입력해주세요">
                    <div id="loginPwError" class="error-message">비밀번호를 입력해주세요.</div>
                </div>

                <!-- 로봇이 아닙니다 체크박스 영역입니다. -->
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="robotCheck"> 
                        로봇이 아닙니다. <span style="color:#ef4444">(필수)</span>
                    </label>
                    <div id="robotError" class="error-message">로봇 확인에 체크해주세요.</div>
                </div>

                <!-- type="submit"인 버튼을 누르면 form의 onsubmit 속성 스크립트가 발생합니다. -->
                <button type="submit" class="submit-btn">로그인</button>
                
                <!-- 메인 페이지로 되돌아가는 편의성 링크입니다. -->
                <a href="index.html" class="back-link">← 메인으로 돌아가기</a>

            </form>
        </div>
    </div>

    <!-- 하단 푸터 영역 -->
    <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid var(--border-color); margin-top: 60px;">
        <h3 style="margin-bottom: 15px; color: #2c3e50; font-weight: 800;">PloiMarket</h3>
        <div style="margin-bottom: 20px; font-size: 0.95rem; color: var(--text-muted);">
            <a href="about.html" style="color: inherit; text-decoration: none; margin: 0 15px;">회사소개</a>
            <a href="cs.html" style="color: inherit; text-decoration: none; margin: 0 15px;">고객센터</a>
            <a href="#" style="color: inherit; text-decoration: none; margin: 0 15px;">이용약관</a>
        </div>
        <p style="color: var(--text-muted); font-size: 0.85rem;">&copy; 2026 PloiMarket. 웹프로그래밍 기말고사 제출용 포트폴리오 (황지호).</p>
    </footer>

    <!-- 자바스크립트 파일 연결 -->
    <script src="script.js"></script>
</body>
</html>
